services:
  - type: web
    name: chronicles-of-arthus
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: dotnet BreakroomAdventure.dll
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
