<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronicles of Arthus</title>
  <style>
    :root {
      --bg-night: #0f1418;
      --bg-dawn: #2b1e16;
      --panel: #f0e1c8;
      --panel-deep: #e3cfaa;
      --ink: #21170d;
      --ink-soft: #5f4b36;
      --line: #9f7f54;
      --gold: #b17f2f;
      --gold-strong: #8f621f;
      --ember: #7d301f;
      --mist: rgba(247, 237, 220, 0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Alegreya", "Book Antiqua", Palatino, serif;
      background:
        radial-gradient(circle at 20% 0%, #74503866 0%, transparent 45%),
        radial-gradient(circle at 80% 100%, #4c3d2e66 0%, transparent 45%),
        linear-gradient(165deg, var(--bg-night) 0%, #1f2329 45%, var(--bg-dawn) 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2.2vw, 24px);
      position: relative;
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      width: 38vmax;
      height: 38vmax;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.3;
      animation: drift 15s ease-in-out infinite alternate;
    }
    body::before {
      background: #9b6a28;
      top: -15vmax;
      left: -12vmax;
    }
    body::after {
      background: #7e3b27;
      bottom: -14vmax;
      right: -12vmax;
      animation-delay: 1.7s;
    }
    .app {
      width: min(920px, 100%);
      background:
        linear-gradient(180deg, #f6e8ce 0%, var(--panel) 55%, var(--panel-deep) 100%);
      border: 2px solid var(--line);
      border-radius: 22px;
      box-shadow:
        0 28px 70px rgba(7, 8, 11, 0.55),
        0 3px 0 rgba(255, 236, 201, 0.25) inset;
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: rise 560ms ease-out both;
    }
    .app::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 16px;
      border: 1px solid rgba(143, 98, 31, 0.45);
      pointer-events: none;
    }
    .header {
      padding: 20px 24px 18px;
      border-bottom: 1px solid rgba(143, 98, 31, 0.35);
      background:
        linear-gradient(180deg, rgba(48, 33, 20, 0.94) 0%, rgba(33, 24, 17, 0.95) 100%);
      color: #f4e4c2;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-mark {
      width: clamp(50px, 6.3vw, 68px);
      height: auto;
      flex: 0 0 auto;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
    }
    .brand-text {
      min-width: 0;
    }
    .header h1 {
      margin: 0;
      font-family: "Cinzel", "Trajan Pro", "Times New Roman", serif;
      font-size: clamp(1.38rem, 2.45vw, 2.05rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #402f1e;
    }
    .header p {
      margin: 8px 0 0;
      color: #dbc29a;
      font-size: 0.99rem;
    }
    .log {
      height: min(56vh, 620px);
      overflow-y: auto;
      padding: 20px 24px;
      background:
        linear-gradient(180deg, rgba(255, 249, 239, 0.65), rgba(248, 234, 206, 0.35)),
        repeating-linear-gradient(
          -35deg,
          rgba(143, 98, 31, 0.05) 0,
          rgba(143, 98, 31, 0.05) 4px,
          transparent 4px,
          transparent 18px
        );
      scrollbar-gutter: stable both-edges;
    }
    .quest-loader {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding: 0 16px;
      border-top: 1px solid transparent;
      background: linear-gradient(180deg, #ecd7b1 0%, #e6cda4 100%);
      transition: max-height 220ms ease, opacity 220ms ease, padding 220ms ease, border-color 220ms ease;
    }
    .quest-loader.active {
      max-height: 78px;
      opacity: 1;
      padding: 12px 16px;
      border-top-color: rgba(143, 98, 31, 0.35);
    }
    .quest-loader-track {
      position: relative;
      height: 12px;
      border-radius: 999px;
      border: 1px solid #795733;
      background: linear-gradient(180deg, #f7ead2 0%, #dcc298 100%);
      overflow: hidden;
      box-shadow: inset 0 1px 4px rgba(24, 16, 8, 0.22);
    }
    .quest-loader-track::before {
      content: "";
      position: absolute;
      inset: 2px auto 2px 2px;
      width: 16px;
      border-radius: 999px;
      background: rgba(247, 231, 202, 0.8);
    }
    .quest-loader-fill {
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, #7a2f1d 0%, #b67326 52%, #f1cf86 100%);
      box-shadow: 0 0 10px rgba(125, 48, 31, 0.35);
      animation: questFill 1.45s linear infinite;
      transform-origin: left center;
    }
    .quest-loader-text {
      margin: 7px 1px 0;
      color: #5c4429;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
    }
    .entry {
      margin: 0 0 16px;
      padding: 13px 15px;
      border-radius: 13px;
      border: 1px solid #b59262;
      background: #fff6e7;
      box-shadow: 0 2px 0 rgba(109, 80, 42, 0.16);
      animation: fadeIn 320ms ease both;
    }
    .entry h3 {
      margin: 0 0 8px;
      font-family: "Cinzel", "Times New Roman", serif;
      font-size: 1.03rem;
      color: var(--gold-strong);
      letter-spacing: 0.02em;
    }
    .entry p {
      margin: 0;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .entry small {
      display: block;
      margin-top: 8px;
      color: var(--ink-soft);
      font-size: 0.92rem;
    }
    .entry.player {
      border-color: #7f5f3a;
      background:
        linear-gradient(180deg, #f5e8cf 0%, #ead7b2 100%);
    }
    .entry.system {
      border-color: #ae8a57;
      background:
        linear-gradient(180deg, #fff7e9 0%, #f4e2c1 100%);
    }
    .controls {
      border-top: 1px solid rgba(143, 98, 31, 0.35);
      padding: 14px 16px 16px;
      display: grid;
      grid-template-columns: 170px 1fr auto auto;
      gap: 10px;
      background:
        linear-gradient(180deg, #f1ddb8 0%, #ead1a8 100%);
    }
    select,
    input[type="text"] {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #89653c;
      font: inherit;
      font-size: 1rem;
      background: #fff9ee;
      color: #2c2013;
      transition: box-shadow 140ms ease, border-color 140ms ease;
    }
    select:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--gold-strong);
      box-shadow: 0 0 0 2px var(--mist);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 120ms ease, filter 120ms ease;
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    button:active {
      transform: translateY(0);
    }
    #sendBtn {
      background: linear-gradient(180deg, var(--ember) 0%, #5f2216 100%);
      color: #f9ebd2;
    }
    #newBtn {
      background: linear-gradient(180deg, #486235 0%, #324a26 100%);
      color: #f3edd8;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 820px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      #actionInput {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 8px;
      }
      .app {
        border-radius: 16px;
      }
      .header {
        padding: 16px 16px 14px;
        gap: 10px;
      }
      .brand-mark {
        width: 46px;
      }
      .log {
        height: 54vh;
        padding: 14px 14px;
      }
      .controls {
        grid-template-columns: 1fr;
        padding: 12px 12px 14px;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(2.5vmax, -1.6vmax, 0) scale(1.08);
      }
    }
    @keyframes questFill {
      0% {
        transform: translateX(-120%) scaleX(0.78);
      }
      45% {
        transform: translateX(-5%) scaleX(1.02);
      }
      100% {
        transform: translateX(230%) scaleX(0.84);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 760px) {
      .log {
        height: 56vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <img class="brand-mark" src="/assets/arthus-crest.svg" alt="Chronicles crest" />
      <div class="brand-text">
        <h1>Chronicles of Arthus</h1>
        <p id="subtitleText">Type what Arthus does next. Short, natural commands work best.</p>
      </div>
    </section>

    <section id="log" class="log" aria-live="polite"></section>
    <section id="questLoader" class="quest-loader" aria-hidden="true">
      <div class="quest-loader-track">
        <div class="quest-loader-fill"></div>
      </div>
      <p id="questLoaderText" class="quest-loader-text">Consulting the Chronicle...</p>
    </section>

    <section class="controls">
      <select id="languageSelect" aria-label="Language">
        <option value="english">English</option>
        <option value="spanish">Español</option>
      </select>
      <input id="actionInput" type="text" placeholder="Example: raise shield and challenge the bandit chief" autocomplete="off" />
      <button id="sendBtn">Send Action</button>
      <button id="newBtn">New Game</button>
    </section>
  </main>

  <script>
    const log = document.getElementById('log');
    const actionInput = document.getElementById('actionInput');
    const sendBtn = document.getElementById('sendBtn');
    const newBtn = document.getElementById('newBtn');
    const languageSelect = document.getElementById('languageSelect');
    const subtitleText = document.getElementById('subtitleText');
    const questLoader = document.getElementById('questLoader');
    const questLoaderText = document.getElementById('questLoaderText');

    let sessionId = null;
    let gameOver = false;
    let currentLanguage = detectBrowserLanguage();

    function detectBrowserLanguage() {
      const all = [...(navigator.languages || []), navigator.language, navigator.userLanguage]
        .filter(Boolean)
        .map((x) => String(x).toLowerCase());
      if (all.some((code) => code.startsWith('es'))) return 'spanish';
      return 'english';
    }

    function t(english, spanish) {
      return currentLanguage === 'spanish' ? spanish : english;
    }

    function syncUiLanguage() {
      sendBtn.textContent = t('Send Action', 'Enviar acción');
      newBtn.textContent = t('New Game', 'Juego nuevo');
      actionInput.placeholder = t(
        'Example: raise shield and challenge the bandit chief',
        'Ejemplo: alzar el escudo y desafiar al jefe bandido'
      );
      subtitleText.textContent = t(
        'Type what Arthus does next. Short, natural commands work best.',
        'Escribe qué hace Arthus ahora. Los comandos cortos y naturales funcionan mejor.'
      );
    }

    function addEntry(type, title, text, meta = "") {
      const item = document.createElement('article');
      item.className = `entry ${type}`;

      let heading = null;
      if (title) {
        const h3 = document.createElement('h3');
        h3.textContent = title;
        item.appendChild(h3);
        heading = h3;
      }

      const p = document.createElement('p');
      p.textContent = text;
      item.appendChild(p);

      let metaNode = null;
      if (meta) {
        const small = document.createElement('small');
        small.textContent = meta;
        item.appendChild(small);
        metaNode = small;
      }

      log.appendChild(item);
      log.scrollTop = log.scrollHeight;

      return { item, heading, paragraph: p, metaNode };
    }

    function appendEntryText(entry, chunk) {
      if (!chunk) return;
      entry.paragraph.textContent += chunk;
      log.scrollTop = log.scrollHeight;
    }

    function updateEntry(entry, title, text, meta) {
      if (title) {
        if (!entry.heading) {
          const h3 = document.createElement('h3');
          entry.item.insertBefore(h3, entry.paragraph);
          entry.heading = h3;
        }
        entry.heading.textContent = title;
      }

      if (typeof text === "string") {
        entry.paragraph.textContent = text;
      }

      if (meta) {
        if (!entry.metaNode) {
          const small = document.createElement('small');
          entry.item.appendChild(small);
          entry.metaNode = small;
        }
        entry.metaNode.textContent = meta;
      } else {
        if (entry.metaNode) {
          entry.metaNode.remove();
          entry.metaNode = null;
        }
      }

      log.scrollTop = log.scrollHeight;
    }

    async function consumeTurnStream(endpoint, payload, handlers) {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        let message = t('Request failed.', 'La solicitud falló.');
        try {
          const errorPayload = await response.json();
          message = errorPayload.error || message;
        } catch {}
        throw new Error(message);
      }

      if (!response.body) {
        throw new Error(t('Streaming is not supported in this browser.', 'El navegador no admite streaming.'));
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let doneReceived = false;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        let delimiterIndex = buffer.indexOf('\n\n');
        while (delimiterIndex !== -1) {
          const block = buffer.slice(0, delimiterIndex).trim();
          buffer = buffer.slice(delimiterIndex + 2);
          delimiterIndex = buffer.indexOf('\n\n');
          if (!block) continue;

          let eventName = "message";
          const dataLines = [];

          for (const line of block.split(/\r?\n/)) {
            if (line.startsWith("event:")) {
              eventName = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
              dataLines.push(line.slice(5).trimStart());
            }
          }

          if (dataLines.length === 0) continue;

          let payloadData;
          try {
            payloadData = JSON.parse(dataLines.join('\n'));
          } catch {
            continue;
          }

          if (eventName === "chunk") {
            if (handlers.onChunk) handlers.onChunk(payloadData);
          } else if (eventName === "done") {
            doneReceived = true;
            if (handlers.onDone) await handlers.onDone(payloadData);
          } else if (eventName === "error") {
            throw new Error(payloadData.error || t('Streaming failed.', 'El streaming falló.'));
          }
        }
      }

      if (!doneReceived) {
        throw new Error(t('Stream ended unexpectedly.', 'El stream terminó inesperadamente.'));
      }
    }

    function setBusy(busy, loaderMessage = "") {
      sendBtn.disabled = busy || gameOver;
      newBtn.disabled = busy;
      actionInput.disabled = busy || gameOver;
      languageSelect.disabled = busy;

      if (!questLoader || !questLoaderText) return;
      if (busy) {
        questLoaderText.textContent = loaderMessage || t('Consulting the Chronicle...', 'Consultando la crónica...');
        questLoader.classList.add('active');
        questLoader.setAttribute('aria-hidden', 'false');
      } else {
        questLoader.classList.remove('active');
        questLoader.setAttribute('aria-hidden', 'true');
      }
    }

    function setGameOver(status, endingLabel) {
      gameOver = status === 'win' || status === 'lose';
      if (gameOver) {
        addEntry(
          'system',
          endingLabel ?? t('ENDING', 'FINAL'),
          status === 'win'
            ? t('Arthus wins this run.', 'Arthus gana esta aventura.')
            : t('Arthus fails this run.', 'Arthus fracasa en esta aventura.')
        );
        sendBtn.disabled = true;
        actionInput.disabled = true;
      }
    }

    function formatTurn(entry, turn) {
      currentLanguage = turn.language || currentLanguage;
      syncUiLanguage();
      const title = turn.title ? `${turn.title} - Episode ${turn.episodeNumber}: ${turn.episodeTitle}` : `Episode ${turn.episodeNumber}: ${turn.episodeTitle}`;
      const hints = (turn.choicesHint || []).join(' | ');
      const meta = turn.status === 'ongoing'
        ? `${t('Turns left', 'Turnos restantes')}: ${turn.turnsRemaining}${hints ? ` | ${t('Try', 'Prueba')}: ${hints}` : ''}`
        : `${t('Status', 'Estado')}: ${turn.status}`;
      updateEntry(entry, title, turn.scene, meta);
      setGameOver(turn.status, turn.endingLabel);
    }

    async function startGame() {
      setBusy(true, t('Preparing a new chronicle...', 'Preparando una nueva crónica...'));
      gameOver = false;
      currentLanguage = languageSelect.value || 'english';
      syncUiLanguage();
      log.innerHTML = '';
      addEntry('system', t('Starting...', 'Iniciando...'), t('Summoning a fresh tale for Arthus.', 'Invocando una nueva historia de Arthus.'));

      try {
        log.innerHTML = '';
        const streamEntry = addEntry('system', t('Chronicle', 'Crónica'), '', t('Receiving tale...', 'Recibiendo relato...'));
        await consumeTurnStream('/api/game/start-stream', { language: currentLanguage }, {
          onChunk: (payloadData) => appendEntryText(streamEntry, payloadData.text),
          onDone: async (turn) => {
            sessionId = turn.sessionId;
            formatTurn(streamEntry, turn);
          }
        });
      } catch (error) {
        log.innerHTML = '';
        addEntry(
          'system',
          t('Error', 'Error'),
          (error && error.message) || t('Network error while starting game.', 'Error de red al iniciar el juego.')
        );
      } finally {
        setBusy(false);
        if (!gameOver) actionInput.focus();
      }
    }

    async function sendAction() {
      if (!sessionId || gameOver) return;

      const action = actionInput.value.trim();
      if (!action) return;

      addEntry('player', t('Arthus Acts', 'Arthus actúa'), action);
      actionInput.value = '';
      setBusy(true, t('Reading the omens of your action...', 'Leyendo los presagios de tu acción...'));

      try {
        const streamEntry = addEntry('system', t('Chronicle Replies', 'Responde la crónica'), '', t('Awaiting fate...', 'Esperando el destino...'));
        await consumeTurnStream('/api/game/turn-stream', { sessionId, action }, {
          onChunk: (payloadData) => appendEntryText(streamEntry, payloadData.text),
          onDone: async (turn) => {
            formatTurn(streamEntry, turn);
          }
        });
      } catch (error) {
        addEntry(
          'system',
          t('Error', 'Error'),
          (error && error.message) || t('Network error while sending action.', 'Error de red al enviar la acción.')
        );
      } finally {
        setBusy(false);
        if (!gameOver) actionInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendAction);
    newBtn.addEventListener('click', startGame);
    languageSelect.addEventListener('change', () => {
      currentLanguage = languageSelect.value || 'english';
      syncUiLanguage();
    });
    actionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') sendAction();
    });

    languageSelect.value = currentLanguage;
    syncUiLanguage();
    startGame();
  </script>
</body>
</html>
