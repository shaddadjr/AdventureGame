<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronicles of Arthus</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --paper: #fffdf8;
      --ink: #1f1a17;
      --accent: #7b2f16;
      --muted: #6f655d;
      --border: #d9ccb7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top, #fff8ea 0%, var(--bg) 55%, #ece2cf 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app {
      width: min(860px, 100%);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(28, 19, 10, 0.16);
      overflow: hidden;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fff9ef 0%, #fdf4e4 100%);
    }
    .header h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2.1vw, 1.9rem);
      letter-spacing: 0.02em;
    }
    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .log {
      height: min(58vh, 640px);
      overflow-y: auto;
      padding: 18px 24px;
      background: repeating-linear-gradient(
        to bottom,
        #fffefb 0,
        #fffefb 31px,
        #f6efe3 32px
      );
    }
    .entry {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .entry h3 {
      margin: 0 0 8px;
      font-size: 1.02rem;
      color: var(--accent);
    }
    .entry p {
      margin: 0;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .entry small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
    }
    .entry.player {
      border-color: #c8d4f0;
      background: #f7faff;
    }
    .entry.system {
      border-color: #f0d9b8;
      background: #fff7ea;
    }
    .controls {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      background: #fffaf0;
    }
    input[type="text"] {
      width: 100%;
      padding: 11px 12px;
      border-radius: 9px;
      border: 1px solid #bda98f;
      font: inherit;
      font-size: 1rem;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 9px;
      padding: 11px 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }
    #sendBtn { background: #7b2f16; color: #fff; }
    #newBtn { background: #2b5b45; color: #fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .log {
        height: 56vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Chronicles of Arthus</h1>
      <p>Type what Arthus does next. Short, natural commands work best.</p>
    </section>

    <section id="log" class="log" aria-live="polite"></section>

    <section class="controls">
      <input id="actionInput" type="text" placeholder="Example: raise shield and challenge the bandit chief" autocomplete="off" />
      <button id="sendBtn">Send Action</button>
      <button id="newBtn">New Game</button>
    </section>
  </main>

  <script>
    const log = document.getElementById('log');
    const actionInput = document.getElementById('actionInput');
    const sendBtn = document.getElementById('sendBtn');
    const newBtn = document.getElementById('newBtn');

    let sessionId = null;
    let gameOver = false;

    function addEntry(type, title, text, meta = "") {
      const item = document.createElement('article');
      item.className = `entry ${type}`;

      if (title) {
        const h3 = document.createElement('h3');
        h3.textContent = title;
        item.appendChild(h3);
      }

      const p = document.createElement('p');
      p.textContent = text;
      item.appendChild(p);

      if (meta) {
        const small = document.createElement('small');
        small.textContent = meta;
        item.appendChild(small);
      }

      log.appendChild(item);
      log.scrollTop = log.scrollHeight;
    }

    function setBusy(busy) {
      sendBtn.disabled = busy || gameOver;
      newBtn.disabled = busy;
      actionInput.disabled = busy || gameOver;
    }

    function setGameOver(status, endingLabel) {
      gameOver = status === 'win' || status === 'lose';
      if (gameOver) {
        addEntry('system', endingLabel ?? 'ENDING', status === 'win' ? 'Arthus wins this run.' : 'Arthus fails this run.');
        sendBtn.disabled = true;
        actionInput.disabled = true;
      }
    }

    function formatTurn(turn) {
      const title = turn.title ? `${turn.title} - Episode ${turn.episodeNumber}: ${turn.episodeTitle}` : `Episode ${turn.episodeNumber}: ${turn.episodeTitle}`;
      const hints = (turn.choicesHint || []).join(' | ');
      const meta = turn.status === 'ongoing' ? `Turns left: ${turn.turnsRemaining}${hints ? ` | Try: ${hints}` : ''}` : `Status: ${turn.status}`;
      addEntry('system', title, turn.scene, meta);
      setGameOver(turn.status, turn.endingLabel);
    }

    async function startGame() {
      setBusy(true);
      gameOver = false;
      log.innerHTML = '';
      addEntry('system', 'Starting...', 'Summoning a fresh tale for Arthus.');

      try {
        const response = await fetch('/api/game/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const data = await response.json();
        log.innerHTML = '';

        if (!response.ok) {
          addEntry('system', 'Error', data.error || 'Could not start game.');
          return;
        }

        sessionId = data.sessionId;
        formatTurn(data);
      } catch {
        log.innerHTML = '';
        addEntry('system', 'Error', 'Network error while starting game.');
      } finally {
        setBusy(false);
        if (!gameOver) actionInput.focus();
      }
    }

    async function sendAction() {
      if (!sessionId || gameOver) return;

      const action = actionInput.value.trim();
      if (!action) return;

      addEntry('player', 'Arthus Acts', action);
      actionInput.value = '';
      setBusy(true);

      try {
        const response = await fetch('/api/game/turn', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, action })
        });

        const data = await response.json();
        if (!response.ok) {
          addEntry('system', 'Error', data.error || 'Action failed. Start a new game.');
          gameOver = true;
          sendBtn.disabled = true;
          actionInput.disabled = true;
          return;
        }

        formatTurn(data);
      } catch {
        addEntry('system', 'Error', 'Network error while sending action.');
      } finally {
        setBusy(false);
        if (!gameOver) actionInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendAction);
    newBtn.addEventListener('click', startGame);
    actionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') sendAction();
    });

    startGame();
  </script>
</body>
</html>
